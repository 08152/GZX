<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Battle X Lobby</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
}

/* ================= BACKGROUND ================= */

.background{
position:fixed;
width:100%;
height:100%;
background:url("1.png") center/cover no-repeat;
}

/* overlay */
.background::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.25);
}

/* ================= START BUTTON ================= */

.topbar{
position:absolute;
top:20px;
width:100%;
display:flex;
justify-content:center;
z-index:5;
}

.start-btn{
background:yellow;
border:none;
padding:15px 45px;
font-size:22px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
box-shadow:0 0 20px yellow;
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.1);
}

/* ================= HAMBURGER ================= */

.hamburger{
position:absolute;
top:25px;
right:25px;
width:40px;
height:30px;
cursor:pointer;
z-index:10;
}

.hamburger div{
height:4px;
background:white;
margin:6px 0;
border-radius:3px;
}

/* ================= MENU ================= */

.menu{
position:absolute;
top:0;
right:-260px;
width:260px;
height:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
transition:0.4s;
z-index:9;
padding-top:80px;
}

.menu.open{
right:0;
}

.menu img{
width:120px;
display:block;
margin:20px auto;
cursor:pointer;
transition:0.3s;
}

.menu img:hover{
transform:scale(1.1);
}

.status{
position:absolute;
bottom:20px;
width:100%;
