<script>


const socket = new WebSocket(
"wss://gzx.onrender.com"
);



socket.onopen = ()=>{

);

}));

};

console.log(
"Server:",
event.data
);


};



socket.onclose = ()=>{

console.log(
"Verbindung beendet"
);

};



</script>
