<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Battle X Lobby</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

height:100vh;
overflow:hidden;
background:black;

}



/* BACKGROUND */

.background{

position:fixed;

inset:0;

background-image:url("./1.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

z-index:0;

}



.background::after{

content:"";

position:absolute;

inset:0;

background:rgba(0,0,0,0.25);

}





/* START */

.topbar{

position:absolute;

top:20px;

width:100%;

display:flex;

justify-content:center;

z-index:5;

}



.start-btn{

background:#ffd900;

border:none;

padding:15px 50px;

font-size:24px;

font-weight:bold;

border-radius:15px;

cursor:pointer;

box-shadow:0 0 20px yellow;

transition:0.3s;

}



.start-btn:hover{

transform:scale(1.1);

}







/* HAMBURGER */

.hamburger{

position:absolute;

top:25px;

right:25px;

width:45px;

cursor:pointer;

z-index:10;

}



.hamburger div{

height:5px;

background:white;

margin:7px 0;

border-radius:5px;

}







/* MENU */

.menu{

position:absolute;

top:0;

right:-280px;

width:280px;

height:100%;

background:rgba(0,0,0,0.85);

backdrop-filter:blur(10px);

transition:0.4s;

z-index:9;

padding-top:90px;

}



.menu.open{

right:0;

}



.menu img{

width:130px;

display:block;

margin:25px auto;

cursor:pointer;

}





/* STATUS */

.status{

position:absolute;

bottom:20px;

width:100%;

text-align:center;

color:white;

font-size:20px;

z-index:5;

}







/* ==================
   LOADING SCREEN
================== */


.loading{

display:none;

position:fixed;

inset:0;

background:#000;

z-index:20;

justify-content:center;

align-items:center;

flex-direction:column;

color:white;

font-size:25px;

}



.loader{

width:70px;

height:70px;

border:8px solid #333;

border-top:8px solid yellow;

border-radius:50%;

animation:rotate 1s linear infinite;

margin-bottom:20px;

}



@keyframes rotate{

100%{

transform:rotate(360deg);

}

}



</style>


</head>


<body>




<div class="background"></div>





<div class="topbar">

<button class="start-btn" onclick="startGame()">

START

</button>

</div>





<div class="hamburger" onclick="toggleMenu()">

<div></div>

<div></div>

<div></div>

</div>





<div class="menu" id="menu">


<img 
src="2_icon.png"

onclick="location.href='gun.html'"

onerror="this.style.display='none'"

>


</div>





<div class="status" id="status">

🔌 Verbinde mit Server...

</div>






<!-- LOADING -->


<div class="loading" id="loading">


<div class="loader"></div>


Lädt Battle X...


</div>








<script>



// Menü


function toggleMenu(){

document
.getElementById("menu")
.classList.toggle("open");

}






// START BUTTON


function startGame(){


document.getElementById("loading")
.style.display="flex";



setTimeout(()=>{


window.location.href="game.html";


},3000);



}







// WebSocket


const status =
document.getElementById("status");



const socket =
new WebSocket(
"wss://gzx.onrender.com"
);



socket.onopen=function(){


status.innerHTML=
"✅ Online verbunden";


};



socket.onerror=function(){


status.innerHTML=
"❌ Server Fehler";


};



socket.onclose=function(){


status.innerHTML=
"⚠ Verbindung getrennt";


};



</script>




</body>

</html>
