<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Battle X Online</title>


<style>

body{

margin:0;

height:100vh;

background:white;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

}


h1{

font-size:50px;

}

</style>


</head>


<body>


<h1 id="status">
Verbinde...
</h1>



<script>


const status =
document.getElementById("status");



const socket = new WebSocket(

"wss://gzx.onrender.com"

);



socket.onopen = ()=>{


status.innerHTML =
"✅ Mit Server verbunden";


console.log(
"Server verbunden"
);


};



socket.onerror = ()=>{


status.innerHTML =
"❌ Server Fehler";


};



socket.onclose = ()=>{


status.innerHTML =
"Server getrennt";


};



</script>



</body>

</html>
