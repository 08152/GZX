<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Battle X Lobby</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
}

/* ================= BACKGROUND ================= */

.background{
position:fixed;
width:100%;
height:100%;

background:url("1.png") center/cover no-repeat;
}

/* optional dark overlay */
.background::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.25);
}

/* ================= START BUTTON ================= */

.topbar{
position:absolute;
top:20px;
width:100%;
display:flex;
justify-content:center;
z-index:5;
}

.start-btn{
background:yellow;
border:none;
padding:15px 45px;
font-size:22px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
box-shadow:0 0 20px yellow;
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.1);
}

/* ================= HAMBURGER ================= */

.hamburger{
position:absolute;
top:25px;
right:25px;
width:40px;
height:30px;
cursor:pointer;
z-index:10;
}

.hamburger div{
height:4px;
background:white;
margin:6px 0;
border-radius:3px;
}

/* ================= SIDE MENU ================= */

.menu{
position:absolute;
top:0;
right:-260px;
width:260px;
height:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
transition:0.4s;
z-index:9;
padding-top:80px;
}

.menu.open{
right:0;
}

/* icons */
.menu img{
width:120px;
display:block;
margin:20px auto;
cursor:pointer;
transition:0.3s;
}

.menu img:hover{
transform:scale(1.1);
}

/* links */
a{
text-decoration:none;
}

</style>

</head>

<body>


<!-- BACKGROUND -->
<div class="background"></div>


<!-- START BUTTON -->
<div class="topbar">
<button class="start-btn">START</button>
</div>


<!-- HAMBURGER -->
<div class="hamburger" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>


<!-- SIDE MENU -->
<div class="menu" id="menu">

<a href="shop.html">
<img src="1_icon.png" onerror="this.style.display='none'">
</a>

<a href="gun.html">
<img src="2_icon.png" onerror="this.style.display='none'">
</a>

</div>


<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

</script>


</body>

</html>
