<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Battle X FPS Feel</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{display:block;}

#info{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:5;
}

#healthBox{
position:absolute;
right:30px;
bottom:30px;
width:300px;
height:35px;
background:#222;
border:3px solid white;
border-radius:10px;
overflow:hidden;
}

#healthBar{
height:100%;
width:100%;
background:limegreen;
transition:0.1s;
}

</style>

</head>

<body>

<div id="info">
WASD bewegen<br>
SPACE springen<br>
Klick = Maus lock
</div>

<div id="healthBox">
<div id="healthBar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>


// ======================
// BASIC SETUP
// ======================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
100000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 4);
light.position.set(0,1000,0);
scene.add(light);


// ======================
// PLAYER
// ======================

const player = new THREE.Object3D();
scene.add(player);

player.position.set(0,455,0);
player.add(camera);
camera.position.y = 2;


// ======================
// PHYSICS (FPS FEEL)
// ======================

let velocity = new THREE.Vector3();   // X Z movement
let velocityY = 0;                    // Y movement

let acceleration = 0.25;
let friction = 0.85;  // wichtig für "sliding feel"
let gravity = 0.04;

let canJump = false;


// ======================
// HEALTH
// ======================

let health = 100;
const hp = document.getElementById("healthBar");

function damage(v){
health -= v;
if(health < 0) health = 0;
hp.style.width = health + "%";

if(health <= 0){
health = 100;
hp.style.width = "100%";
respawn();
}
}

function respawn(){
player.position.set(0,455,0);
velocity.set(0,0,0);
velocityY = 0;
}


// ======================
// MOUSE CONTROL
// ======================

let rx = 0;
let ry = 0;

document.body.onclick = () => {
document.body.requestPointerLock();
};

document.onmousemove = (e) => {

if(document.pointerLockElement){

ry -= e.movementX * 0.002;
rx -= e.movementY * 0.002;

rx = Math.max(-1.5, Math.min(1.5, rx));

camera.rotation.x = rx;
player.rotation.y = ry;

}

};


// ======================
// INPUT
// ======================

let keys = {};

document.onkeydown = (e) => {

keys[e.key.toLowerCase()] = true;

if(e.code === "Space" && canJump){
velocityY = 1.2;
canJump = false;
}

};

document.onkeyup = (e) => {
keys[e.key.toLowerCase()] = false;
};


// ======================
// UPDATE LOOP
// ======================

function update(){

// direction input
let dir = new THREE.Vector3();

if(keys.w) dir.z -= 1;
if(keys.s) dir.z += 1;
if(keys.a) dir.x -= 1;
if(keys.d) dir.x += 1;

dir.normalize();

// rotate to player direction
dir.applyAxisAngle(
new THREE.Vector3(0,1,0),
player.rotation.y
);


// acceleration (FEEL CONTROL)
velocity.x += dir.x * acceleration;
velocity.z += dir.z * acceleration;


// friction (sliding feel)
velocity.x *= friction;
velocity.z *= friction;


// apply movement
player.position.x += velocity.x;
player.position.z += velocity.z;



// gravity
velocityY -= gravity;
player.position.y += velocityY;


// ground check (spawn only for now)
if(
player.position.y <= 455 &&
Math.abs(player.position.x) < 120 &&
Math.abs(player.position.z) < 120
){
player.position.y = 455;
velocityY = 0;
canJump = true;
}


// fall reset
if(player.position.y < -600){
damage(20);
respawn();
}

}


// ======================
// LOOP
// ======================

function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}

animate();


</script>

</body>
</html>
