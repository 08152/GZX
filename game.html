<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>FPS Room Event</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{display:block;}

#hud{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
z-index:10;
}

#timer{
position:absolute;
top:20px;
right:20px;
color:#00ff00;
font-family:monospace;
font-size:20px;
z-index:10;
text-shadow:0 0 10px #00ff00;
}

#dialog{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
color:yellow;
font-size:28px;
font-family:Arial;
z-index:10;
opacity:0;
transition:0.5s;
}

</style>

</head>

<body>

<div id="hud">
WASD bewegen<br>
Klick = Maus
</div>

<div id="timer">WAITING PLAYERS...</div>

<div id="dialog"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ======================
// SCENE
// ======================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);


// CAMERA
const camera = new THREE.PerspectiveCamera(
75,innerWidth/innerHeight,0.1,3000
);


// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);



// ======================
// LIGHT (HELLER GEMACHT)
// ======================

// Ambient viel stärker
scene.add(new THREE.AmbientLight(0xffffff,0.9));

// Hauptlicht
const mainLight = new THREE.DirectionalLight(0xffffff,1.5);
mainLight.position.set(50,100,50);
scene.add(mainLight);


// Zusatzlicht für Helligkeit
const fillLight = new THREE.PointLight(0xffffff,1);
fillLight.position.set(0,20,0);
scene.add(fillLight);



// ======================
// ROOM (RIESIG)
// ======================

const roomSize = 200;

const room = new THREE.Mesh(
new THREE.BoxGeometry(roomSize,roomSize,roomSize),
new THREE.MeshStandardMaterial({
color:0x333333,
side:THREE.BackSide
})
);

scene.add(room);



// ======================
// DOOR (JETZT UNTEN)
// ======================

const doorMat = new THREE.MeshStandardMaterial({color:0x444444});

const doorLeft = new THREE.Mesh(
new THREE.BoxGeometry(10,20,2),
doorMat
);

const doorRight = new THREE.Mesh(
new THREE.BoxGeometry(10,20,2),
doorMat
);


// 🔥 unten im Raum (statt hinten oben)
doorLeft.position.set(-5,-90,-98);
doorRight.position.set(5,-90,-98);

scene.add(doorLeft);
scene.add(doorRight);



// ======================
// PLAYER
// ======================

const player = new THREE.Object3D();
scene.add(player);

player.position.set(0,0,0);

camera.position.y = 2;
player.add(camera);



// ======================
// FPS PHYSICS
// ======================

let velocity = new THREE.Vector3();
let gravity = 0.03;
let canJump = false;

let keys = {};

document.onkeydown=(e)=>{
keys[e.key.toLowerCase()]=true;

if(e.code==="Space" && canJump){
velocity.y = 0.9;
canJump = false;
}
};

document.onkeyup=(e)=>{
keys[e.key.toLowerCase()]=false;
};



// ======================
// MOUSE
// ======================

let rx=0, ry=0;

document.body.onclick=()=>{
document.body.requestPointerLock();
};

document.onmousemove=(e)=>{

if(document.pointerLockElement){

ry -= e.movementX*0.002;
rx -= e.movementY*0.002;

rx=Math.max(-1.5,Math.min(1.5,rx));

camera.rotation.x=rx;
player.rotation.y=ry;

}

};



// ======================
// NPCs
// ======================

const npcMat = new THREE.MeshStandardMaterial({color:0xffff00});

let npcs = [];

function spawnNPC(x){
const m = new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
npcMat
);
m.position.set(x,0,-60);
scene.add(m);
npcs.push(m);
}

spawnNPC(-3);
spawnNPC(0);
spawnNPC(3);



// ======================
// TIMER SYSTEM
// ======================

let timer = 60;
const timerUI = document.getElementById("timer");
const dialog = document.getElementById("dialog");

function start(){

let t = setInterval(()=>{

timer--;
timerUI.innerText = "START IN: " + timer;

if(timer<=0){
clearInterval(t);
cutscene();
}

},1000);

}



// ======================
// CUTSCENE
// ======================

function cutscene(){

timerUI.innerText = "EVENT START";

let step = 0;

let move = setInterval(()=>{

step++;

// NPC laufen rein
npcs.forEach(n=>{
n.position.z += 0.5;
});

if(step > 60){
clearInterval(move);
say();
}

},30);

}



// ======================
// DIALOG
// ======================

function say(){

dialog.style.opacity=1;
dialog.innerText="🔊 Hallo Test!";

setTimeout(()=>{
dialog.style.opacity=0;
closeDoors();
},2500);

}



// ======================
// DOORS CLOSE (unten position fix)
// ======================

function closeDoors(){

let step=0;

let back = setInterval(()=>{

step++;

npcs.forEach(n=>{
n.position.z -= 0.5;
});

// Türen zurück
doorLeft.position.x -= 0.08;
doorRight.position.x += 0.08;

if(step>60){
clearInterval(back);
}

},30);

}



// ======================
// UPDATE
// ======================

function update(){

let dir = new THREE.Vector3();

if(keys.w) dir.z -= 1;
if(keys.s) dir.z += 1;
if(keys.a) dir.x -= 1;
if(keys.d) dir.x += 1;

dir.normalize();

dir.applyAxisAngle(new THREE.Vector3(0,1,0),player.rotation.y);

velocity.x += dir.x * 0.2;
velocity.z += dir.z * 0.2;

velocity.x *= 0.85;
velocity.z *= 0.85;

velocity.y -= gravity;

player.position.add(velocity);


// floor
if(player.position.y < 0){
player.position.y = 0;
velocity.y = 0;
canJump = true;
}

}



// ======================
// LOOP
// ======================

function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}

animate();


// start event
start();

</script>

</body>
</html>
