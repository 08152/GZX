<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle X FPS ULTIMATE</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{display:block;}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
z-index:10;
font-size:14px;
}

#healthBox{
position:absolute;
right:20px;
bottom:20px;
width:250px;
height:25px;
background:#222;
border:2px solid white;
}

#health{
width:100%;
height:100%;
background:lime;
}

#ammo{
position:absolute;
right:20px;
bottom:60px;
color:white;
font-size:18px;
}

#crosshair{
position:absolute;
left:50%;
top:50%;
width:10px;
height:10px;
transform:translate(-50%,-50%);
border:2px solid white;
border-radius:50%;
}
</style>

</head>

<body>

<div id="hud">
WASD bewegen | SHIFT sprint | SPACE springen | Klick = Lock + Schießen
</div>

<div id="crosshair"></div>

<div id="ammo">Ammo: 30</div>

<div id="healthBox"><div id="health"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =========================
// SCENE
// =========================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,10000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff,2);
light.position.set(100,200,100);
scene.add(light);

// =========================
// FLOOR
// =========================
const floorGeo = new THREE.BoxGeometry(1000,1,1000);
const floorMat = new THREE.MeshStandardMaterial({color:0x444444});
const floor = new THREE.Mesh(floorGeo,floorMat);
floor.position.y = -1;
scene.add(floor);

// =========================
// PLAYER
// =========================
const player = new THREE.Object3D();
scene.add(player);
player.add(camera);
camera.position.y = 2;

// spawn
player.position.set(0,2,5);

// =========================
// MOVEMENT PHYSICS
// =========================
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();

let speed = 0.12;
let sprintSpeed = 0.22;
let friction = 0.85;

let gravity = 0.03;
let velocityY = 0;

let canJump = false;

// camera bob
let bob = 0;

// =========================
// INPUT
// =========================
let keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;

if(e.code === "Space" && canJump){
velocityY = 0.8;
canJump = false;
}
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

// mouse
let rotX = 0;
let rotY = 0;

document.body.onclick = ()=>document.body.requestPointerLock();

document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement){
rotY -= e.movementX * 0.002;
rotX -= e.movementY * 0.002;
rotX = Math.max(-1.4,Math.min(1.4,rotX));
player.rotation.y = rotY;
camera.rotation.x = rotX;
}
});

// =========================
// HEALTH / UI
// =========================
let health = 100;
const healthBar = document.getElementById("health");

function damage(v){
health -= v;
if(health < 0) health = 0;
healthBar.style.width = health + "%";
if(health <= 0) respawn();
}

function respawn(){
player.position.set(0,2,5);
health = 100;
healthBar.style.width = "100%";
}

// =========================
// WEAPON
// =========================
let ammo = 30;
let maxAmmo = 30;
let reloadTime = false;

const ammoUI = document.getElementById("ammo");

function shoot(){
if(reloadTime) return;
if(ammo <= 0) return;

ammo--;
ammoUI.innerText = "Ammo: " + ammo;

raycastShoot();
}

document.addEventListener("mousedown",shoot);

function reload(){
reloadTime = true;
setTimeout(()=>{
ammo = maxAmmo;
ammoUI.innerText = "Ammo: " + ammo;
reloadTime = false;
},1200);
}

document.addEventListener("keydown",(e)=>{
if(e.key === "r") reload();
});

// =========================
// ENEMIES
// =========================
let enemies = [];

function spawnEnemy(x,z){
const geo = new THREE.BoxGeometry(2,2,2);
const mat = new THREE.MeshStandardMaterial({color:0xff0000});
const mesh = new THREE.Mesh(geo,mat);

mesh.position.set(x,1,z);
scene.add(mesh);

enemies.push({
mesh:mesh,
hp:3
});
}

for(let i=0;i<10;i++){
spawnEnemy((Math.random()-0.5)*50, (Math.random()-0.5)*50);
}

// =========================
// SHOOTING (RAYCAST)
// =========================
const raycaster = new THREE.Raycaster();

function raycastShoot(){

raycaster.setFromCamera(new THREE.Vector2(0,0),camera);

const hits = raycaster.intersectObjects(enemies.map(e=>e.mesh));

if(hits.length > 0){
const hit = hits[0].object;

const enemy = enemies.find(e=>e.mesh === hit);

if(enemy){
enemy.hp--;

enemy.mesh.material.color.set(0xffff00);

setTimeout(()=>{
enemy.mesh.material.color.set(0xff0000);
},100);

if(enemy.hp <= 0){
scene.remove(enemy.mesh);
enemies = enemies.filter(e=>e !== enemy);
}
}
}
}

// =========================
// UPDATE ENEMIES AI
// =========================
function updateEnemies(){
for(let e of enemies){
let dir = new THREE.Vector3();
dir.subVectors(player.position,e.mesh.position);
dir.y = 0;
dir.normalize();

e.mesh.position.addScaledVector(dir,0.02);

// damage if close
if(e.mesh.position.distanceTo(player.position) < 2){
damage(1);
}
}
}

// =========================
// MOVEMENT
// =========================
function updateMovement(){

direction.set(0,0,0);

if(keys.w) direction.z -= 1;
if(keys.s) direction.z += 1;
if(keys.a) direction.x -= 1;
if(keys.d) direction.x += 1;

direction.normalize();
direction.applyAxisAngle(new THREE.Vector3(0,1,0),player.rotation.y);

let currentSpeed = keys.shift ? sprintSpeed : speed;

velocity.x += direction.x * currentSpeed;
velocity.z += direction.z * currentSpeed;

velocity.x *= friction;
velocity.z *= friction;

player.position.x += velocity.x;
player.position.z += velocity.z;

// gravity
velocityY -= gravity;
player.position.y += velocityY;

// ground
if(player.position.y <= 2){
player.position.y = 2;
velocityY = 0;
canJump = true;
}
}

// =========================
// CAMERA BOB
// =========================
function updateBob(){
if(direction.length() > 0.1 && canJump){
bob += 0.2;
camera.position.y = 2 + Math.sin(bob) * 0.05;
}else{
camera.position.y = 2;
}
}

// =========================
// LOOP
// =========================
function animate(){
requestAnimationFrame(animate);

updateMovement();
updateEnemies();
updateBob();

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
