<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Battle X Arena</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}


#info{

position:absolute;
top:20px;
left:20px;

color:white;
font-family:Arial;

z-index:5;

}



#healthBox{

position:absolute;

right:30px;

bottom:30px;

width:300px;

height:35px;

background:#222;

border:3px solid white;

border-radius:10px;

overflow:hidden;

z-index:5;

}



#healthBar{

height:100%;

width:100%;

background:limegreen;

}



</style>


</head>


<body>


<div id="info">
Klick = Maus<br>
WASD = bewegen<br>
SPACE = springen
</div>



<div id="healthBox">

<div id="healthBar"></div>

</div>




<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>



<script>




// =================
// BASIC
// =================


const scene =
new THREE.Scene();


scene.background =
new THREE.Color(
0x87ceeb
);




const camera =
new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
100000
);




const renderer =
new THREE.WebGLRenderer();


renderer.setSize(
innerWidth,
innerHeight
);


document.body.appendChild(
renderer.domElement
);





const light =
new THREE.DirectionalLight(
0xffffff,
4
);


light.position.set(
0,
1000,
0
);


scene.add(light);






// =================
// TEXTUR
// =================


const texture =
new THREE.TextureLoader()
.load(
"textur.png"
);







// =================
// BLOCK
// =================


const SIZE = 4;


function createBlock(x,y,z){


let b =
new THREE.Mesh(

new THREE.BoxGeometry(
SIZE,
SIZE,
SIZE
),

new THREE.MeshStandardMaterial({

map:texture

})

);


b.position.set(
x,y,z
);


return b;

}






// =================
// CHUNKS
// =================


const chunkSize=20;

let chunks={};



function loadChunk(cx,cz){


let id =
cx+"_"+cz;


if(chunks[id])
return;



let group =
new THREE.Group();



for(
let x=0;
x<chunkSize;
x+=SIZE
){


for(
let z=0;
z<chunkSize;
z+=SIZE
){


group.add(

createBlock(

cx*chunkSize+x,

-300,

cz*chunkSize+z

)

);


}

}



scene.add(group);


chunks[id]=group;


}





function deleteChunks(cx,cz){


for(let id in chunks){


let p=id.split("_");



if(
Math.abs(p[0]-cx)>5 ||
Math.abs(p[1]-cz)>5
){


scene.remove(
chunks[id]
);


delete chunks[id];


}


}


}









// =================
// ARENA BODEN
// =================


for(
let x=-200;
x<=200;
x+=SIZE
){

for(
let z=-200;
z<=200;
z+=SIZE
){


scene.add(

createBlock(
x,
-300,
z
)

);


}

}







// =================
// WÄNDE OHNE DECKE
// =================


const wall=300;


for(
let y=-300;
y<=100;
y+=SIZE
){


for(
let x=-200;
x<=200;
x+=SIZE
){


scene.add(

createBlock(
x,
y,
-200
)

);


scene.add(

createBlock(
x,
y,
200
)

);


}



for(
let z=-200;
z<=200;
z+=SIZE
){


scene.add(

createBlock(
-200,
y,
z
)

);



scene.add(

createBlock(
200,
y,
z
)

);


}


}





// =================
// SPAWN PLATTFORM
// =================


for(
let x=-120;
x<=120;
x+=SIZE
){


for(
let z=-120;
z<=120;
z+=SIZE
){


scene.add(

createBlock(
x,
450,
z
)

);


}

}








// =================
// PLAYER
// =================


const player =
new THREE.Object3D();


scene.add(player);


player.position.set(
0,
454,
0
);


player.add(camera);


camera.position.y=2;







// =================
// PHYSIK
// =================


let velocityY=0;


let gravity=0.04;


let canJump=false;


let health=100;


const hp=
document.getElementById(
"healthBar"
);





function damage(x){


health-=x;


hp.style.width=
health+"%";



if(health<=0){


health=100;


hp.style.width="100%";


player.position.set(
0,
454,
0
);


}



}







// =================
// MOUSE
// =================


let rx=0;

let ry=0;



document.body.onclick=()=>{

document.body.requestPointerLock();

};



document.onmousemove=e=>{


if(document.pointerLockElement){


ry-=e.movementX*0.002;


rx-=e.movementY*0.002;



rx=Math.max(
-1.5,
Math.min(1.5,rx)
);



camera.rotation.x=rx;


player.rotation.y=ry;


}


};







// =================
// MOVEMENT
// =================


let keys={};


document.onkeydown=e=>{


keys[e.key.toLowerCase()]=true;



if(
e.code==="Space" &&
canJump
){


velocityY=1;


canJump=false;


}



};



document.onkeyup=e=>{

keys[e.key.toLowerCase()]=false;

};








function update(){



let move =
new THREE.Vector3();



if(keys.w)
move.z-=1;


if(keys.s)
move.z+=1;


if(keys.a)
move.x-=1;


if(keys.d)
move.x+=1;



move.normalize();



move.applyAxisAngle(
new THREE.Vector3(0,1,0),
player.rotation.y
);



player.position.add(
move
);







// GRAVITY


velocityY-=gravity;


player.position.y+=velocityY;





// nur Spawn Plattform hält

if(
player.position.y<=454 &&
player.position.y>400
){


player.position.y=454;


velocityY=0;


canJump=true;


}







// fallen in Arena möglich

if(player.position.y<-500){


damage(25);



player.position.set(
0,
454,
0
);



}






// chunks


let cx=
Math.floor(
player.position.x/chunkSize
);


let cz=
Math.floor(
player.position.z/chunkSize
);



for(
let x=-5;
x<=5;
x++
){

for(
let z=-5;
z<=5;
z++
){


loadChunk(
cx+x,
cz+z
);


}

}



deleteChunks(
cx,
cz
);



}






function animate(){


requestAnimationFrame(
animate
);


update();



renderer.render(
scene,
camera
);


}



animate();



</script>


</body>

</html>
