<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Battle X Arena</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}


#info{

position:absolute;
top:20px;
left:20px;

color:white;
font-family:Arial;

z-index:5;

}



#healthBox{

position:absolute;

right:30px;

bottom:30px;

width:300px;

height:35px;

background:#222;

border:3px solid white;

border-radius:10px;

overflow:hidden;

z-index:5;

}



#healthBar{

height:100%;

width:100%;

background:limegreen;

}



</style>

</head>


<body>


<div id="info">
Klick = Maus<br>
WASD = bewegen<br>
SPACE = springen
</div>


<div id="healthBox">

<div id="healthBar"></div>

</div>



<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>



<script>


// =================
// BASIC
// =================


const scene =
new THREE.Scene();


scene.background =
new THREE.Color(
0x87ceeb
);




const camera =
new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
100000
);




const renderer =
new THREE.WebGLRenderer();


renderer.setSize(
innerWidth,
innerHeight
);


document.body.appendChild(
renderer.domElement
);






const light =
new THREE.DirectionalLight(
0xffffff,
4
);


light.position.set(
0,
1000,
0
);


scene.add(light);








// =================
// BLOCK OHNE TEXTUR
// =================


const SIZE = 4;


function createBlock(
x,
y,
z,
color=0x555555
){


let b =
new THREE.Mesh(

new THREE.BoxGeometry(
SIZE,
SIZE,
SIZE
),


new THREE.MeshStandardMaterial({

color:color

})


);



b.position.set(
x,y,z
);



return b;

}









// =================
// ARENA BODEN
// =================


for(
let x=-200;
x<=200;
x+=SIZE
){


for(
let z=-200;
z<=200;
z+=SIZE
){


scene.add(

createBlock(
x,
-300,
z,
0x555555
)

);


}

}








// =================
// WÄNDE OHNE DECKE
// =================


for(
let y=-300;
y<=100;
y+=SIZE
){



for(
let x=-200;
x<=200;
x+=SIZE
){


scene.add(

createBlock(
x,
y,
-200,
0x333333
)

);



scene.add(

createBlock(
x,
y,
200,
0x333333
)

);



}



for(
let z=-200;
z<=200;
z+=SIZE
){


scene.add(

createBlock(
-200,
y,
z,
0x333333
)

);



scene.add(

createBlock(
200,
y,
z,
0x333333
)

);


}



}








// =================
// SPAWN PLATTFORM
// =================


const spawnMaterial =
new THREE.MeshStandardMaterial({

color:0x00ffff,

transparent:true,

opacity:0.35

});





for(
let x=-120;
x<=120;
x+=SIZE
){


for(
let z=-120;
z<=120;
z+=SIZE
){



let spawn =
new THREE.Mesh(

new THREE.BoxGeometry(
SIZE,
1,
SIZE
),

spawnMaterial

);



spawn.position.set(
x,
450,
z
);



scene.add(spawn);



}

}








// =================
// PLAYER
// =================


const player =
new THREE.Object3D();



scene.add(player);



player.position.set(
0,
455,
0
);



player.add(camera);



camera.position.y=2;







// =================
// PHYSIK
// =================


let velocityY=0;


let gravity=0.04;


let canJump=false;







// =================
// HEALTH
// =================


let health=100;


const hp =
document.getElementById(
"healthBar"
);




function damage(value){


health-=value;



hp.style.width =
health+"%";



if(health<=0){


health=100;


hp.style.width="100%";



respawn();


}


}







function respawn(){


player.position.set(
0,
455,
0
);


velocityY=0;


}









// =================
// MOUSE
// =================


let rx=0;

let ry=0;



document.body.onclick=()=>{

document.body.requestPointerLock();

};





document.onmousemove=e=>{


if(document.pointerLockElement){


ry-=e.movementX*0.002;


rx-=e.movementY*0.002;



rx=Math.max(
-1.5,
Math.min(1.5,rx)
);



camera.rotation.x=rx;


player.rotation.y=ry;


}



};








// =================
// MOVEMENT
// =================


let keys={};



document.onkeydown=e=>{


keys[e.key.toLowerCase()]=true;



if(
e.code==="Space" &&
canJump
){


velocityY=1;


canJump=false;


}


};




document.onkeyup=e=>{


keys[e.key.toLowerCase()]=false;


};









function update(){



let move =
new THREE.Vector3();



if(keys.w)
move.z-=1;


if(keys.s)
move.z+=1;


if(keys.a)
move.x-=1;


if(keys.d)
move.x+=1;



move.normalize();



move.applyAxisAngle(
new THREE.Vector3(0,1,0),
player.rotation.y
);



player.position.add(
move
);








// FALLEN


velocityY-=gravity;


player.position.y+=velocityY;







// Spawn Plattform

if(

player.position.y<=455 &&

player.position.y>440 &&

Math.abs(player.position.x)<120 &&

Math.abs(player.position.z)<120

){


player.position.y=455;


velocityY=0;


canJump=true;


}








// Arena Boden


if(

player.position.y<=-296 &&

Math.abs(player.position.x)<200 &&

Math.abs(player.position.z)<200

){


player.position.y=-296;


velocityY=0;


canJump=true;


}







// aus Welt gefallen


if(player.position.y<-600){


damage(25);


respawn();


}



}








function animate(){


requestAnimationFrame(
animate
);


update();


renderer.render(
scene,
camera
);


}



animate();



</script>


</body>

</html>
