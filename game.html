<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS Cinematic Room</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#overlay {
    position:absolute;
    width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.6);
    color:white;
    font-family:Arial;
    cursor:pointer;
    z-index:10;
}
</style>
</head>
<body>

<div id="overlay">Klick zum Starten</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/PointerLockControls.js"></script>

<script>
let scene, camera, renderer, controls;
let overlay = document.getElementById("overlay");

let moveF=false, moveB=false, moveL=false, moveR=false;
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
let canJump = false;

let players = 1;
let eventStarted = false;
let timer = 60;

let doorLeft, doorRight;
let npcs = [];
let doorProgress = 0;

init();
animate();

/* ---------------- INIT ---------------- */
function init(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

overlay.onclick = () => controls.lock();

controls.addEventListener("lock", ()=> overlay.style.display="none");
controls.addEventListener("unlock", ()=> overlay.style.display="flex");

/* LIGHTS */
scene.add(new THREE.HemisphereLight(0xffffff,0x444444,0.7));

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

/* ROOM */
const room = new THREE.Mesh(
    new THREE.BoxGeometry(50,20,50),
    new THREE.MeshStandardMaterial({color:0x222222, side:THREE.BackSide})
);
scene.add(room);

/* FLOOR */
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* DOOR */
const mat = new THREE.MeshStandardMaterial({color:0x6b3d1a});

doorLeft = new THREE.Mesh(new THREE.BoxGeometry(1.5,6,0.5), mat);
doorRight = new THREE.Mesh(new THREE.BoxGeometry(1.5,6,0.5), mat);

doorLeft.position.set(-0.75,3,-24.5);
doorRight.position.set(0.75,3,-24.5);

scene.add(doorLeft);
scene.add(doorRight);

/* SCREEN */
const canvas = document.createElement("canvas");
canvas.width=256; canvas.height=128;
const ctx = canvas.getContext("2d");
const tex = new THREE.CanvasTexture(canvas);

const screen = new THREE.Mesh(
    new THREE.PlaneGeometry(6,3),
    new THREE.MeshBasicMaterial({map:tex})
);
screen.position.set(0,9,-24.2);
scene.add(screen);

setInterval(()=>{
    ctx.fillStyle="black";
    ctx.fillRect(0,0,256,128);

    ctx.fillStyle="#00ff00";
    ctx.font="20px monospace";
    ctx.fillText("PLAYERS: "+players,10,40);
    ctx.fillText("TIME: "+Math.floor(timer),10,80);

    tex.needsUpdate=true;
},100);

/* INPUT */
document.addEventListener("keydown",(e)=>{
    if(e.code==="KeyW") moveF=true;
    if(e.code==="KeyS") moveB=true;
    if(e.code==="KeyA") moveL=true;
    if(e.code==="KeyD") moveR=true;

    if(e.code==="Space" && canJump){
        velocity.y = 0.18;
        canJump=false;
    }
});

document.addEventListener("keyup",(e)=>{
    if(e.code==="KeyW") moveF=false;
    if(e.code==="KeyS") moveB=false;
    if(e.code==="KeyA") moveL=false;
    if(e.code==="KeyD") moveR=false;
});

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

/* NPC */
function spawnNPC(){
    const npc = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshStandardMaterial({color:"yellow"})
    );
    npc.position.set(0,1,-8);
    scene.add(npc);
    npcs.push(npc);
}

/* TIMER */
function updateTimer(dt){
if(players >= 1 && !eventStarted){
    eventStarted = true;
    timer = 60;
}

if(eventStarted){
    timer -= dt;

    if(timer < 50 && npcs.length === 0){
        spawnNPC(); spawnNPC(); spawnNPC();
    }
}
}

/* LOOP */
let clock = new THREE.Clock();

function animate(){
requestAnimationFrame(animate);

let dt = clock.getDelta();

if(controls.isLocked){

updateTimer(dt);

/* MOVEMENT (FPS STYLE) */
direction.z = Number(moveF) - Number(moveB);
direction.x = Number(moveR) - Number(moveL);
direction.normalize();

/* acceleration */
velocity.x += direction.x * 0.02;
velocity.z += direction.z * 0.02;

/* friction */
velocity.x *= 0.85;
velocity.z *= 0.85;

/* gravity */
velocity.y -= 0.01;

/* apply movement */
controls.moveRight(velocity.x);
controls.moveForward(velocity.z);

/* jump / ground */
controls.getObject().position.y += velocity.y;

if(controls.getObject().position.y < 1.7){
    controls.getObject().position.y = 1.7;
    velocity.y = 0;
    canJump = true;
}

/* cinematic bob */
controls.getObject().position.y += Math.sin(Date.now()*0.003)*0.002;

/* DOOR */
doorAnimation(dt);

/* NPC */
npcLogic();

}

renderer.render(scene,camera);
}

/* DOOR CINEMATIC */
function doorAnimation(dt){

if(timer < 55) doorProgress += dt * 0.5;
doorProgress = Math.min(1, doorProgress);

let e = doorProgress*doorProgress*(3-2*doorProgress);

doorLeft.position.x = -0.75 + (-3.2 + 0.75)*e;
doorRight.position.x = 0.75 + (3.2 - 0.75)*e;
}

/* NPC MOVE */
function npcLogic(){
npcs.forEach(n => {
let target = 0;

if(timer < 50) target = -2;
if(timer < 45) target = -8;

n.position.z += (target - n.position.z) * 0.05;
});
}

animate();
</script>

</body>
</html>
